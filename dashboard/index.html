<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Deep ALPR · Access Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css?v=20260523h">
  <link rel="icon" type="image/png" href="/img/deepalpr.png">
  <script>
    try {
      var saved = localStorage.getItem("alpr_theme");
      var t = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
</head>
<body>
  <div id="app"><div class="spinner"></div></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>
  <script src="/js/app.js?v=20260523l"></script>
</body>
</html>
